name: SubSense
options:
  bundleIdPrefix: com.subsense
  deploymentTarget:
    iOS: "17.0"
  defaultConfig: Debug
  groupSortPosition: top
  generateEmptyDirectories: true
  createIntermediateGroups: true
  indentWidth: 4
  tabWidth: 4

packages:
  supabase-swift:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"
  SwiftLint:
    url: https://github.com/realm/SwiftLint
    from: "0.55.0"

settings:
  SWIFT_VERSION: "5.0"

configs:
  Debug: debug
  Release: release

targets:
  SubSense:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: SubSense
        excludes:
          - Widgets/**
          - "**/*.md"
          - "**/WidgetInfo.plist"
    resources:
      - path: SubSense/Resources
        excludes:
          - ServiceCatalog.json
      - path: SubSense/Resources/ServiceCatalog.json
      - path: SubSense/Resources/Localizable.xcstrings
    dependencies:
      - package: supabase-swift
        product: Supabase
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.subsense.app
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: SubSense/Info.plist
        CODE_SIGN_ENTITLEMENTS: SubSense/SubSense.entitlements
        DEVELOPMENT_TEAM: ""
        ENABLE_PREVIEWS: YES
      Debug:
        DEBUG_INFORMATION_FORMAT: dwarf
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
      Release:
        DEBUG_INFORMATION_FORMAT: "dwarf-with-dsym"
        SWIFT_OPTIMIZATION_LEVEL: "-O"
    plugins:
      - package: SwiftLint
        plugin: SwiftLintBuildToolPlugin

  SubSenseWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: SubSense/Widgets
    resources:
      - path: SubSense/Resources/Assets.xcassets
    dependencies:
      - target: SubSense
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.subsense.app.widgets
        INFOPLIST_FILE: SubSense/Widgets/WidgetInfo.plist
        CODE_SIGN_ENTITLEMENTS: SubSense/Widgets/SubSenseWidgets.entitlements
        DEVELOPMENT_TEAM: ""
